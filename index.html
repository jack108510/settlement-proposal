<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SettleSmart — Settlement Proposal Manager</title>
<meta name="theme-color" content="#1e293b">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--blue:#2563eb;--navy:#0f172a;--surface:#1e293b;--surface2:#334155;--border:#475569;--text:#f1f5f9;--muted:#94a3b8;--dim:#64748b;--green:#22c55e;--red:#ef4444;--amber:#f59e0b;--radius:12px}
body{background:var(--navy);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;min-height:100vh}

nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
nav h1{font-size:1rem;font-weight:800}nav h1 span{color:var(--blue)}
.nav-tabs{display:flex;gap:2px}
.nav-tab{color:var(--muted);font-size:.78rem;font-weight:600;padding:6px 12px;border-radius:8px;cursor:pointer;border:none;background:none;transition:all .15s}
.nav-tab:hover{color:var(--text);background:var(--surface2)}
.nav-tab.active{color:var(--blue);background:var(--surface2)}

.wrap{max-width:600px;margin:0 auto;padding:20px}
.page{display:none}.page.active{display:block}

/* Party selector */
.party-bar{display:flex;gap:8px;margin-bottom:20px}
.party-btn{flex:1;padding:12px;border-radius:var(--radius);border:2px solid var(--border);background:var(--surface);color:var(--text);font-size:.85rem;font-weight:700;cursor:pointer;text-align:center;transition:all .15s}
.party-btn.active{border-color:var(--blue);background:rgba(37,99,235,.1);color:var(--blue)}
.party-btn .emoji{font-size:20px;display:block;margin-bottom:4px}

/* Proposal card */
.proposal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px;overflow:hidden}
.proposal-head{padding:16px;display:flex;justify-content:space-between;align-items:flex-start}
.proposal-title{font-size:.92rem;font-weight:800}
.proposal-date{font-size:.68rem;color:var(--dim);margin-top:2px}
.status{font-size:.62rem;font-weight:700;padding:3px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:.04em;flex-shrink:0}
.status-pending{background:rgba(245,158,11,.1);color:var(--amber)}
.status-approved{background:rgba(34,197,94,.1);color:var(--green)}
.status-rejected{background:rgba(239,68,68,.1);color:var(--red)}
.status-counter{background:rgba(37,99,235,.1);color:var(--blue)}

.proposal-body{padding:0 16px 16px}
.proposal-items{display:grid;gap:6px;margin-bottom:12px}
.item{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:var(--navy);border-radius:8px}
.item-label{font-size:.8rem;color:var(--muted)}
.item-value{font-size:.85rem;font-weight:700}
.item-value.party-a{color:var(--blue)}.item-value.party-b{color:var(--amber)}

.proposal-total{display:flex;justify-content:space-between;padding:10px 12px;background:var(--surface2);border-radius:8px;margin-bottom:12px}
.total-label{font-size:.78rem;font-weight:700;color:var(--muted)}
.total-value{font-size:1rem;font-weight:900}

.proposal-notes{font-size:.78rem;color:var(--muted);line-height:1.5;padding:10px 12px;background:var(--navy);border-radius:8px;margin-bottom:12px}

/* Response area */
.response-area{padding:0 16px 16px}
.response-text{width:100%;padding:10px 12px;background:var(--navy);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:.82rem;font-family:inherit;resize:vertical;min-height:60px;margin-bottom:8px}
.response-text:focus{border-color:var(--blue);outline:none}
.response-btns{display:flex;gap:8px}
.rbtn{flex:1;padding:10px;border:none;border-radius:8px;font-size:.82rem;font-weight:700;cursor:pointer;transition:all .15s}
.rbtn-approve{background:rgba(34,197,94,.15);color:var(--green)}.rbtn-approve:hover{background:rgba(34,197,94,.25)}
.rbtn-reject{background:rgba(239,68,68,.15);color:var(--red)}.rbtn-reject:hover{background:rgba(239,68,68,.25)}
.rbtn-counter{background:rgba(37,99,235,.15);color:var(--blue)}.rbtn-counter:hover{background:rgba(37,99,235,.25)}

/* Rejection reason */
.rejection{padding:10px 14px;margin:0 16px 16px;background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.15);border-radius:8px}
.rejection-label{font-size:.65rem;font-weight:700;color:var(--red);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.rejection-text{font-size:.8rem;color:var(--muted);line-height:1.5}

/* Counter offer */
.counter{padding:10px 14px;margin:0 16px 16px;background:rgba(37,99,235,.06);border:1px solid rgba(37,99,235,.15);border-radius:8px}
.counter-label{font-size:.65rem;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}

/* Form */
.form{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:20px}
.form h3{font-size:.95rem;font-weight:800;margin-bottom:14px}
.field{margin-bottom:12px}
.field label{display:block;font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--dim);margin-bottom:4px}
.field input,.field textarea,.field select{width:100%;padding:9px 12px;background:var(--navy);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:.84rem;font-family:inherit;outline:none}
.field input:focus,.field textarea:focus{border-color:var(--blue)}
.add-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;background:none;border:1px dashed var(--border);border-radius:8px;color:var(--blue);font-size:.78rem;font-weight:700;cursor:pointer;margin-bottom:12px}
.add-btn:hover{background:var(--surface2)}
.submit-btn{width:100%;padding:12px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-size:.88rem;font-weight:700;cursor:pointer}
.submit-btn:hover{background:#1d4ed8}

.items-list{margin-bottom:12px}
.item-row{display:flex;gap:6px;margin-bottom:6px;align-items:center}
.item-row input{flex:1}
.item-row select{width:80px}
.remove-item{width:32px;height:32px;border-radius:6px;border:none;background:rgba(239,68,68,.1);color:var(--red);cursor:pointer;font-size:16px;flex-shrink:0}

.section-label{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--dim);margin-bottom:10px}
.metrics{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:20px}
.metric{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;text-align:center}
.metric .val{font-size:1.2rem;font-weight:900;color:var(--blue)}
.metric .lbl{font-size:.62rem;color:var(--dim);text-transform:uppercase;letter-spacing:.05em;margin-top:2px}
.metric.green .val{color:var(--green)}.metric.red .val{color:var(--red)}.metric.amber .val{color:var(--amber)}

@media(max-width:400px){.nav-tab{padding:5px 8px;font-size:.72rem}.metrics{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>

<nav>
  <h1>Settle<span>Smart</span></h1>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="go('proposals',this)">Proposals</button>
    <button class="nav-tab" onclick="go('new',this)">New Proposal</button>
    <button class="nav-tab" onclick="go('summary',this)">Summary</button>
  </div>
</nav>

<div class="wrap page active" id="pg-proposals">
  <div class="section-label">Viewing As</div>
  <div class="party-bar">
    <button class="party-btn active" onclick="setParty('a',this)"><span class="emoji">🔵</span>Party A</button>
    <button class="party-btn" onclick="setParty('b',this)"><span class="emoji">🟡</span>Party B</button>
  </div>
  <div id="proposalList"></div>
</div>

<div class="wrap page" id="pg-new">
  <div class="form">
    <h3>New Proposal</h3>
    <div class="field"><label>From</label><select id="f-from"><option value="a">Party A</option><option value="b">Party B</option></select></div>
    <div class="field"><label>Title</label><input id="f-title" placeholder="e.g. Asset division proposal #1"/></div>
    <div class="field"><label>Notes</label><textarea id="f-notes" placeholder="Additional context or reasoning..."></textarea></div>
    <div class="section-label" style="margin-top:16px">Items</div>
    <div class="items-list" id="itemsList">
      <div class="item-row"><input placeholder="Item (e.g. Family home)" class="i-name"/><input placeholder="$" class="i-val" type="number"/><select class="i-party"><option value="a">Party A</option><option value="b">Party B</option><option value="split">Split</option></select><button class="remove-item" onclick="this.parentElement.remove()">×</button></div>
    </div>
    <button class="add-btn" onclick="addItem()">+ Add Item</button>
    <div class="field"><label>Supporting Details</label><textarea id="f-details" placeholder="Why this proposal is fair, market values, legal precedents..."></textarea></div>
    <button class="submit-btn" onclick="submitProposal()">Submit Proposal</button>
  </div>
</div>

<div class="wrap page" id="pg-summary">
  <div class="metrics" id="summaryMetrics"></div>
  <div class="section-label">Settlement Breakdown</div>
  <div id="summaryBreakdown"></div>
</div>

<script>
let currentParty = 'a';

const DATA = {
  proposals: [
    {
      id: 1, from: 'a', title: 'Initial Asset Division',
      date: '2026-05-01', status: 'counter',
      items: [
        {name:'Family home (123 Oak St)',value:485000,to:'a'},
        {name:'2019 Honda CR-V',value:24000,to:'a'},
        {name:'Joint savings account',value:42000,to:'split'},
        {name:'Jack\'s RRSP',value:67000,to:'a'},
        {name:'Jack\'s pension (present value)',value:89000,to:'a'},
      ],
      notes: 'Proposing to keep the home and vehicle in exchange for waiving claim to Sarah\'s business assets. Pension and RRSP earned during marriage subject to division.',
      details: 'Home purchased 2018 for $420K, current assessed value $485K. Mortgage remaining $285K. Vehicle purchased 2019, Kelly Blue Book $24K.',
      response: 'counter',
      responseText: 'The home equity split needs adjustment. I propose 60/40 in my favor given my higher contribution to the down payment. Also requesting full RRSP offset against pension.',
      counterItems: [
        {name:'Family home equity (net $200K)',value:120000,to:'b'},
        {name:'Family home equity (net $200K)',value:80000,to:'a'},
        {name:'2019 Honda CR-V',value:24000,to:'a'},
        {name:'Joint savings',value:21000,to:'a'},
        {name:'Joint savings',value:21000,to:'b'},
        {name:'RRSP offset',value:67000,to:'b'},
        {name:'Pension offset',value:44500,to:'b'},
      ]
    },
    {
      id: 2, from: 'b', title: 'Business Valuation Response',
      date: '2026-05-02', status: 'pending',
      items: [
        {name:'Sarah\'s Bakery (goodwill + equipment)',value:95000,to:'b'},
        {name:'Bakery equipment replacement value',value:32000,to:'b'},
        {name:'Business loan outstanding',value:18000,to:'split'},
      ],
      notes: 'The bakery was started 2 years before marriage. Only the growth during marriage should be divisible. Submitting professional valuation report.',
      details: 'Business started 2016, married 2018. Valuation at marriage date: $45K. Current valuation: $95K. Only $50K growth subject to division per family law.',
      response: null,
      responseText: null
    },
    {
      id: 3, from: 'a', title: 'Parenting Schedule Proposal',
      date: '2026-05-02', status: 'approved',
      items: [
        {name:'Primary residence with Party A',value:0,to:'a'},
        {name:'Weekends (Fri 5pm - Sun 7pm)',value:0,to:'b'},
        {name:'Wednesday overnight',value:0,to:'b'},
        {name:'Alternating holidays',value:0,to:'split'},
        {name:'Shared decision-making (education, health)',value:0,to:'split'},
      ],
      notes: 'Proposing week-about schedule that maintains school stability for the children while maximizing both parents\' time.',
      details: 'Children ages 8 and 11. Both attend Riverside Elementary. Party A lives 2km from school, Party B lives 8km.',
      response: 'approved',
      responseText: 'This schedule works well for the kids. I agree to the Wednesday overnight and alternating holidays. Let\'s formalize this.'
    }
  ]
};

function go(id,el){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('pg-'+id).classList.add('active');
  el.classList.add('active');
  if(id==='proposals')renderProposals();
  if(id==='summary')renderSummary();
}

function setParty(p,el){
  currentParty=p;
  document.querySelectorAll('.party-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  renderProposals();
}

function fmt(n){return n===0?'—':'$'+n.toLocaleString()}

function renderItems(items){
  return items.map(i=>`<div class="item"><span class="item-label">${i.name}</span><span class="item-value ${i.to==='a'?'party-a':i.to==='b'?'party-b':''}">${fmt(i.value)} → ${i.to==='a'?'Party A':i.to==='b'?'Party B':'Split'}</span></div>`).join('');
}

function renderProposals(){
  const el=document.getElementById('proposalList');
  el.innerHTML=DATA.proposals.map(p=>{
    const isRecipient=(p.from!==currentParty);
    const totalA=p.items.filter(i=>i.to==='a').reduce((s,i)=>s+i.value,0);
    const totalB=p.items.filter(i=>i.to==='b').reduce((s,i)=>s+i.value,0);
    
    let html=`<div class="proposal">
      <div class="proposal-head">
        <div><div class="proposal-title">${p.title}</div><div class="proposal-date">From ${p.from==='a'?'Party A':'Party B'} · ${p.date}</div></div>
        <span class="status status-${p.status}">${p.status}</span>
      </div>
      <div class="proposal-body">
        <div class="proposal-items">${renderItems(p.items)}</div>
        <div class="proposal-total"><span class="total-label">Party A total</span><span class="total-value" style="color:var(--blue)">${fmt(totalA)}</span></div>
        <div class="proposal-total"><span class="total-label">Party B total</span><span class="total-value" style="color:var(--amber)">${fmt(totalB)}</span></div>
        ${p.notes?`<div class="proposal-notes">📝 ${p.notes}</div>`:''}
        ${p.details?`<div class="proposal-notes">📋 ${p.details}</div>`:''}`;
    
    // Show rejection/counter reason
    if(p.response==='rejected'&&p.responseText){
      html+=`<div class="rejection"><div class="rejection-label">Rejected — Reason</div><div class="rejection-text">${p.responseText}</div></div>`;
    }
    if(p.response==='counter'&&p.responseText){
      html+=`<div class="counter"><div class="counter-label">Counter-Offer from ${p.from==='a'?'Party B':'Party A'}</div><div class="rejection-text">${p.responseText}</div>
      ${p.counterItems?`<div class="proposal-items" style="margin-top:10px">${renderItems(p.counterItems)}</div>`:''}</div>`;
    }
    if(p.response==='approved'&&p.responseText){
      html+=`<div class="counter" style="background:rgba(34,197,94,.06);border-color:rgba(34,197,94,.15)"><div class="counter-label" style="color:var(--green)">Approved</div><div class="rejection-text">${p.responseText}</div></div>`;
    }
    
    // Response buttons for recipient
    if(isRecipient&&p.status==='pending'){
      html+=`<div class="response-area">
        <textarea class="response-text" id="resp-${p.id}" placeholder="Your thoughts... (required for rejection)"></textarea>
        <div class="response-btns">
          <button class="rbtn rbtn-approve" onclick="respond(${p.id},'approved')">✓ Approve</button>
          <button class="rbtn rbtn-reject" onclick="respond(${p.id},'rejected')">✕ Reject</button>
          <button class="rbtn rbtn-counter" onclick="respond(${p.id},'counter')">↔ Counter</button>
        </div></div>`;
    }
    
    html+=`</div></div>`;
    return html;
  }).join('');
}

function respond(id,action){
  const text=document.getElementById('resp-'+id).value.trim();
  if(action==='rejected'&&!text){alert('Please explain why you\'re rejecting this proposal.');return}
  const p=DATA.proposals.find(x=>x.id===id);
  p.response=action;
  p.responseText=text||null;
  p.status=action;
  renderProposals();
}

function addItem(){
  const list=document.getElementById('itemsList');
  const row=document.createElement('div');
  row.className='item-row';
  row.innerHTML='<input placeholder="Item" class="i-name"/><input placeholder="$" class="i-val" type="number"/><select class="i-party"><option value="a">Party A</option><option value="b">Party B</option><option value="split">Split</option></select><button class="remove-item" onclick="this.parentElement.remove()">×</button>';
  list.appendChild(row);
}

function submitProposal(){
  const from=document.getElementById('f-from').value;
  const title=document.getElementById('f-title').value.trim();
  const notes=document.getElementById('f-notes').value.trim();
  const details=document.getElementById('f-details').value.trim();
  if(!title){alert('Add a title');return}
  
  const rows=document.querySelectorAll('#itemsList .item-row');
  const items=[];
  rows.forEach(r=>{
    const name=r.querySelector('.i-name').value.trim();
    const val=parseFloat(r.querySelector('.i-val').value)||0;
    const to=r.querySelector('.i-party').value;
    if(name)items.push({name,value:val,to});
  });
  if(!items.length){alert('Add at least one item');return}
  
  DATA.proposals.unshift({
    id:Date.now(),from,title,date:new Date().toISOString().split('T')[0],
    status:'pending',items,notes,details:details||null,
    response:null,responseText:null
  });
  
  document.getElementById('f-title').value='';
  document.getElementById('f-notes').value='';
  document.getElementById('f-details').value='';
  
  go('proposals',document.querySelector('.nav-tab'));
}

function renderSummary(){
  const all=DATA.proposals;
  const approved=all.filter(p=>p.status==='approved');
  const pending=all.filter(p=>p.status==='pending');
  const countered=all.filter(p=>p.status==='counter');
  
  // Calculate totals from approved items
  let totalA=0,totalB=0;
  approved.forEach(p=>{
    p.items.forEach(i=>{
      if(i.to==='a')totalA+=i.value;
      if(i.to==='b')totalB+=i.value;
    });
  });
  
  document.getElementById('summaryMetrics').innerHTML=`
    <div class="metric green"><div class="val">${approved.length}</div><div class="lbl">Approved</div></div>
    <div class="metric amber"><div class="val">${pending.length}</div><div class="lbl">Pending</div></div>
    <div class="metric"><div class="val">${countered.length}</div><div class="lbl">Countered</div></div>`;
  
  const el=document.getElementById('summaryBreakdown');
  if(!approved.length&&!pending.length){
    el.innerHTML='<div style="text-align:center;color:var(--dim);padding:32px">No proposals yet</div>';
    return;
  }
  
  // Show all items across all proposals
  el.innerHTML=all.map(p=>{
    const totalAp=p.items.filter(i=>i.to==='a').reduce((s,i)=>s+i.value,0);
    const totalBp=p.items.filter(i=>i.to==='b').reduce((s,i)=>s+i.value,0);
    return `<div class="proposal">
      <div class="proposal-head"><div><div class="proposal-title">${p.title}</div><div class="proposal-date">${p.from==='a'?'Party A':'Party B'} · ${p.date}</div></div><span class="status status-${p.status}">${p.status}</span></div>
      <div class="proposal-body">
        <div class="proposal-total"><span class="total-label">Party A</span><span class="total-value" style="color:var(--blue)">${fmt(totalAp)}</span></div>
        <div class="proposal-total"><span class="total-label">Party B</span><span class="total-value" style="color:var(--amber)">${fmt(totalBp)}</span></div>
      </div></div>`;
  }).join('');
}

renderProposals();
</script>
</body>
</html>
