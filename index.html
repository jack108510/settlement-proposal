<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>SettleSmart — Settlement Proposal Manager</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--blue:#2563eb;--blue-light:#60a5fa;--blue-dim:#eff6ff;--blue-border:#dbeafe;--green:#16a34a;--green-dim:#f0fdf4;--red:#dc2626;--red-dim:#fef2f2;--navy:#1e3a5f;--muted:#64748b;--bg:#f4f8ff;--white:#fff;--border:#e2e8f0}
body{background:var(--bg);color:var(--navy);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;min-height:100vh}
.app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}

/* Header */
.header{background:var(--white);border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.header h1{font-size:1.1rem;font-weight:800}.header h1 span{color:var(--blue)}
.header-actions{display:flex;gap:8px}
.btn-sm{padding:8px 14px;border-radius:8px;font-size:.8rem;font-weight:700;border:none;cursor:pointer;transition:all .15s}
.btn-primary{background:var(--blue);color:#fff}.btn-primary:hover{background:#1d4ed8}
.btn-outline{background:var(--white);color:var(--blue);border:1px solid var(--blue-border)}

/* Summary Bar */
.summary{background:var(--white);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;justify-content:space-between}
.summary-item{text-align:center;flex:1}
.summary-val{font-size:1.2rem;font-weight:900}
.summary-val.positive{color:var(--green)}.summary-val.negative{color:var(--red)}.summary-val.total{color:var(--blue)}
.summary-lbl{font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-top:2px}

/* Parties */
.parties{display:flex;border-bottom:1px solid var(--border)}
.party-tab{flex:1;padding:14px;text-align:center;font-size:.85rem;font-weight:700;cursor:pointer;border:none;background:var(--white);color:var(--muted);transition:all .15s}
.party-tab.active{color:var(--blue);border-bottom:3px solid var(--blue);background:var(--blue-dim)}

/* Items List */
.items{flex:1;padding:12px 16px;overflow-y:auto}
.item-card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:all .15s}
.item-card:hover{border-color:var(--blue);box-shadow:0 2px 8px rgba(37,99,235,.08)}
.item-card:active{transform:scale(.98)}
.item-row{display:flex;justify-content:space-between;align-items:center}
.item-name{font-size:.9rem;font-weight:700;color:var(--navy)}
.item-type{font-size:.65rem;font-weight:700;padding:3px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.05em}
.item-type.asset{background:var(--green-dim);color:var(--green)}
.item-type.liability{background:var(--red-dim);color:var(--red)}
.item-val{font-size:1rem;font-weight:900;color:var(--navy)}
.item-meta{font-size:.75rem;color:var(--muted);margin-top:4px}

/* Add Button */
.add-btn{position:fixed;bottom:24px;right:24px;width:56px;height:56px;border-radius:50%;background:var(--blue);color:#fff;border:none;font-size:28px;cursor:pointer;box-shadow:0 4px 16px rgba(37,99,235,.3);transition:all .2s;z-index:10}
.add-btn:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(37,99,235,.4)}

/* Modal */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:100;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.sh{display:flex}
.modal{background:var(--white);border-radius:20px 20px 0 0;width:100%;max-width:480px;padding:24px;max-height:85vh;overflow-y:auto}
.modal-handle{width:40px;height:4px;border-radius:2px;background:var(--border);margin:0 auto 16px}
.modal h2{font-size:1.2rem;font-weight:900;margin-bottom:16px}
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:5px}
.form-input{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:10px;font-size:.9rem;outline:none;font-family:inherit;transition:border-color .15s}
.form-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.08)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn-row{display:flex;gap:10px;margin-top:20px}
.btn-row .btn-sm{flex:1;padding:12px;text-align:center}

/* Detail View */
.detail{padding:16px}
.detail-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
.detail-title{font-size:1.3rem;font-weight:900}
.detail-value{font-size:1.5rem;font-weight:900;margin-bottom:4px}
.detail-field{margin-bottom:14px}
.detail-field label{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);display:block;margin-bottom:4px}
.detail-field p{font-size:.9rem;color:var(--navy);line-height:1.5}

/* Empty State */
.empty{text-align:center;padding:48px 24px;color:var(--muted)}
.empty-icon{font-size:48px;margin-bottom:12px;opacity:.5}
.empty h3{font-size:1rem;font-weight:700;margin-bottom:6px;color:var(--navy)}
.empty p{font-size:.85rem;line-height:1.5}

@media(min-width:481px){.app{border-left:1px solid var(--border);border-right:1px solid var(--border)}}
</style>
</head>
<body>
<div class="app" id="app"></div>

<script>
const SAVE_KEY='settlesmart_data';
let state={parties:['Party A','Party B'],items:[],currentParty:0,view:'list'};

function load(){const d=localStorage.getItem(SAVE_KEY);if(d)state=JSON.parse(d)}
function save(){localStorage.setItem(SAVE_KEY,JSON.stringify(state))}

function $(id){return document.getElementById(id)}
function fmt(n){return new Intl.NumberFormat('en-CA',{style:'currency',currency:'CAD',minimumFractionDigits:0,maximumFractionDigits:0}).format(n)}

function render(){
  const app=$('app');
  if(state.view==='list')renderList(app);
  else if(state.view==='detail')renderDetail(app);
  else if(state.view==='add')renderAdd(app);
}

function renderList(app){
  const party=state.parties[state.currentParty];
  const partyItems=state.items.filter(i=>i.party===state.currentParty);
  const assets=partyItems.filter(i=>i.type==='asset');
  const liabilities=partyItems.filter(i=>i.type==='liability');
  const totalAssets=assets.reduce((s,i)=>s+i.value,0);
  const totalLiab=liabilities.reduce((s,i)=>s+i.value,0);
  const net=totalAssets-totalLiab;

  // Overall totals
  const allAssets=state.items.filter(i=>i.type==='asset').reduce((s,i)=>s+i.value,0);
  const allLiab=state.items.filter(i=>i.type==='liability').reduce((s,i)=>s+i.value,0);
  const diff=allAssets-allLiab;

  app.innerHTML=`
    <div class="header">
      <h1>Settle<span>Smart</span></h1>
      <div class="header-actions">
        <button class="btn-sm btn-outline" onclick="exportProposal()">Export</button>
        <button class="btn-sm btn-primary" onclick="resetAll()">New</button>
      </div>
    </div>
    <div class="summary">
      <div class="summary-item"><div class="summary-val positive">${fmt(allAssets)}</div><div class="summary-lbl">Total Assets</div></div>
      <div class="summary-item"><div class="summary-val negative">${fmt(allLiab)}</div><div class="summary-lbl">Total Liabilities</div></div>
      <div class="summary-item"><div class="summary-val total">${fmt(diff)}</div><div class="summary-lbl">Net Difference</div></div>
    </div>
    <div class="parties">
      ${state.parties.map((p,i)=>`<button class="party-tab ${i===state.currentParty?'active':''}" onclick="switchParty(${i})">${p}<br/><small style="font-weight:400;font-size:.7rem">${fmt(i===state.currentParty?net:(state.items.filter(x=>x.party===i&&x.type==='asset').reduce((s,x)=>s+x.value,0)-state.items.filter(x=>x.party===i&&x.type==='liability').reduce((s,x)=>s+x.value,0)))}</small></button>`).join('')}
    </div>
    <div class="items">
      ${partyItems.length===0?`<div class="empty"><div class="empty-icon">📋</div><h3>No items yet</h3><p>Add assets and liabilities for ${party}</p></div>`:''}
      ${assets.length?`<div style="font-size:.7rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px;margin-top:4px">Assets (${fmt(totalAssets)})</div>`:''}
      ${assets.map((item,i)=>`<div class="item-card" onclick="viewDetail(${state.items.indexOf(item)})"><div class="item-row"><div><div class="item-name">${item.name}</div><div class="item-meta">${item.category||'General'}</div></div><div style="text-align:right"><div class="item-val">${fmt(item.value)}</div><span class="item-type asset">Asset</span></div></div></div>`).join('')}
      ${liabilities.length?`<div style="font-size:.7rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin:12px 0 6px">Liabilities (${fmt(totalLiab)})</div>`:''}
      ${liabilities.map((item,i)=>`<div class="item-card" onclick="viewDetail(${state.items.indexOf(item)})"><div class="item-row"><div><div class="item-name">${item.name}</div><div class="item-meta">${item.category||'General'}</div></div><div style="text-align:right"><div class="item-val">-${fmt(item.value)}</div><span class="item-type liability">Liability</span></div></div></div>`).join('')}
    </div>
    <button class="add-btn" onclick="showAdd()">+</button>
  `;
}

function renderDetail(app){
  const item=state.items[state.detailIdx];
  if(!item){state.view='list';render();return}
  app.innerHTML=`
    <div class="header">
      <button class="btn-sm btn-outline" onclick="state.view='list';render()">← Back</button>
      <h1>${item.name}</h1>
      <button class="btn-sm btn-outline" style="color:var(--red)" onclick="deleteItem(${state.detailIdx})">Delete</button>
    </div>
    <div class="detail">
      <div class="detail-header">
        <div>
          <div class="detail-value ${item.type==='asset'?'positive':'negative'}">${item.type==='asset'?'':'−'}${fmt(item.value)}</div>
          <span class="item-type ${item.type}">${item.type}</span>
        </div>
      </div>
      <div class="detail-field"><label>Category</label><p>${item.category||'General'}</p></div>
      <div class="detail-field"><label>Assigned To</label><p>${state.parties[item.party]}</p></div>
      ${item.description?`<div class="detail-field"><label>Notes</label><p>${item.description}</p></div>`:''}
      ${item.date?`<div class="detail-field"><label>Date Added</label><p>${item.date}</p></div>`:''}
    </div>
  `;
}

function renderAdd(app){
  app.innerHTML=`
    <div class="header">
      <button class="btn-sm btn-outline" onclick="state.view='list';render()">Cancel</button>
      <h1>Add Item</h1>
      <button class="btn-sm btn-primary" onclick="saveItem()">Save</button>
    </div>
    <div style="padding:16px">
      <div class="form-group"><label class="form-label">Item Name</label><input class="form-input" id="add-name" placeholder="e.g. Family Home"/></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Value ($)</label><input class="form-input" id="add-value" type="number" placeholder="500000"/></div>
        <div class="form-group"><label class="form-label">Type</label><select class="form-input" id="add-type"><option value="asset">Asset</option><option value="liability">Liability</option></select></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Category</label><select class="form-input" id="add-cat"><option value="Real Estate">Real Estate</option><option value="Vehicle">Vehicle</option><option value="Investment">Investment</option><option value="Bank Account">Bank Account</option><option value="Pension/RRSP">Pension/RRSP</option><option value="Business">Business</option><option value="Debt">Debt</option><option value="Tax Liability">Tax Liability</option><option value="Personal">Personal</option><option value="Other">Other</option></select></div>
        <div class="form-group"><label class="form-label">Assigned To</label><select class="form-input" id="add-party">${state.parties.map((p,i)=>`<option value="${i}" ${i===state.currentParty?'selected':''}>${p}</option>`).join('')}</select></div>
      </div>
      <div class="form-group"><label class="form-label">Notes</label><textarea class="form-input" id="add-desc" rows="3" placeholder="Optional details"></textarea></div>
    </div>
  `;
}

function switchParty(i){state.currentParty=i;render()}
function showAdd(){state.view='add';render()}
function viewDetail(i){state.detailIdx=i;state.view='detail';render()}

function saveItem(){
  const name=$('add-name').value.trim();
  const value=parseFloat($('add-value').value);
  if(!name||isNaN(value)){alert('Please fill in name and value');return}
  state.items.push({
    name,value:Math.abs(value),
    type:$('add-type').value,
    category:$('add-cat').value,
    party:parseInt($('add-party').value),
    description:$('add-desc').value.trim(),
    date:new Date().toLocaleDateString('en-CA')
  });
  save();state.view='list';render();
}

function deleteItem(i){
  if(confirm('Delete this item?')){
    state.items.splice(i,1);
    save();state.view='list';render();
  }
}

function resetAll(){
  if(confirm('Clear all items and start fresh?')){
    state={parties:['Party A','Party B'],items:[],currentParty:0,view:'list'};
    save();render();
  }
}

function exportProposal(){
  let text='SETTLEMENT PROPOSAL\n'+'='.repeat(40)+'\n\n';
  state.parties.forEach((party,pi)=>{
    const items=state.items.filter(i=>i.party===pi);
    const assets=items.filter(i=>i.type==='asset');
    const liab=items.filter(i=>i.type==='liability');
    const totalA=assets.reduce((s,i)=>s+i.value,0);
    const totalL=liab.reduce((s,i)=>s+i.value,0);
    text+=`${party.toUpperCase()}\n${'-'.repeat(30)}\n`;
    if(assets.length){text+='ASSETS:\n';assets.forEach(a=>text+=`  ${a.name}: ${fmt(a.value)} (${a.category})\n`);text+=`  Total Assets: ${fmt(totalA)}\n\n`}
    if(liab.length){text+='LIABILITIES:\n';liab.forEach(l=>text+=`  ${l.name}: ${fmt(l.value)} (${l.category})\n`);text+=`  Total Liabilities: ${fmt(totalL)}\n\n`}
    text+=`NET: ${fmt(totalA-totalL)}\n\n`;
  });
  const blob=new Blob([text],{type:'text/plain'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='settlement-proposal.txt';a.click();
}

load();render();
</script>
</body>
</html>
